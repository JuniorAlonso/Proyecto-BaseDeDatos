services:
  db_estancia:
    image: postgres:15-alpine
    container_name: container_market
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: marketDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/01_estructura.sql:/docker-entrypoint-initdb.d/01_estructura.sql
      - ./database/02_seguridad_auditoria.sql:/docker-entrypoint-initdb.d/02_seguridad_auditoria.sql
      - ./database/03_datos_prueba.sql:/docker-entrypoint-initdb.d/03_datos_prueba.sql
    networks:
      - red_estancia

  pgadmin_estancia:
    image: dpage/pgadmin4
    container_name: container_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@estancia.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db_estancia
    networks:
      - red_estancia

volumes:
  postgres_data:

networks:
  red_estancia:
    driver: bridge