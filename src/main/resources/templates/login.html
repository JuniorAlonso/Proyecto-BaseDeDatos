<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - La Estancia</title>
    <link rel="stylesheet" href="../Css/Style.css">
</head>
<body class="login-page">
    <div class="login-header-wave">
        <div style="text-align: center; margin-bottom: 50px;" class="animate-fade-up">
            <h1 style="font-size: 36px; font-weight: 300;">Bienvenido a <span style="font-weight: 700; color: #009EB3;">La Estancia</span></h1>
            <p style="font-weight: 300; margin-top: 10px;">Sistema de Gestión Empresarial</p>
        </div>
        <svg viewBox="0 0 1440 120" preserveAspectRatio="none"><path d="M0,60 C480,120 960,0 1440,60 L1440,120 L0,120 Z" fill="#F8F9FA"></path></svg>
    </div>
    <div class="login-content animate-fade-up delay-1">
        <div class="login-box">
            <h2>Iniciar Sesión</h2>
            <form action="dashboard.html">
                <div class="form-group"><label>Usuario</label><input type="text" class="form-control" required></div>
                <div class="form-group"><label>Contraseña</label><input type="password" class="form-control" required></div>
                <button type="submit" class="btn">Ingresar al panel</button>
            </form>
        </div>
    </div>
    
    <script src="../Js/App.js"></script>
</body>
</html>
